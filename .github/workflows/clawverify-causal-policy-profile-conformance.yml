name: clawverify-causal-policy-profile-conformance

on:
  pull_request:
    paths:
      - 'services/clawverify/**'
      - 'packages/schema/fixtures/protocol-conformance/clawverify-causal-policy-profile/**'
      - 'services/clawverify/test/causal-policy-profile-conformance.test.ts'
      - 'scripts/protocol/run-clawverify-causal-policy-profile-conformance.mjs'
      - '.github/workflows/clawverify-causal-policy-profile-conformance.yml'
  push:
    branches:
      - main
    paths:
      - 'services/clawverify/**'
      - 'packages/schema/fixtures/protocol-conformance/clawverify-causal-policy-profile/**'
      - 'services/clawverify/test/causal-policy-profile-conformance.test.ts'
      - 'scripts/protocol/run-clawverify-causal-policy-profile-conformance.mjs'
      - '.github/workflows/clawverify-causal-policy-profile-conformance.yml'

jobs:
  causal-policy-profile-conformance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clawverify deps
        run: |
          cd services/clawverify
          npm ci

      - name: Run causal policy profile conformance fixtures
        run: |
          node scripts/protocol/run-clawverify-causal-policy-profile-conformance.mjs
