name: clawverify-x402-binding-conformance

on:
  pull_request:
    paths:
      - 'services/clawverify/**'
      - 'packages/schema/poh/gateway_receipt.v1.json'
      - 'packages/schema/fixtures/protocol-conformance/clawverify-x402-binding/**'
      - 'scripts/protocol/run-clawverify-x402-binding-conformance.mjs'
      - '.github/workflows/clawverify-x402-binding-conformance.yml'
  push:
    branches:
      - main
    paths:
      - 'services/clawverify/**'
      - 'packages/schema/poh/gateway_receipt.v1.json'
      - 'packages/schema/fixtures/protocol-conformance/clawverify-x402-binding/**'
      - 'scripts/protocol/run-clawverify-x402-binding-conformance.mjs'
      - '.github/workflows/clawverify-x402-binding-conformance.yml'

jobs:
  x402-binding-conformance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clawverify deps
        run: |
          cd services/clawverify
          npm ci

      - name: Run x402 binding conformance fixtures
        run: |
          node scripts/protocol/run-clawverify-x402-binding-conformance.mjs
