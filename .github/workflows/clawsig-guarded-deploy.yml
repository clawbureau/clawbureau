name: clawsig-guarded-deploy

on:
  workflow_dispatch:
    inputs:
      max_run_ref_age_minutes:
        description: Max age for latest run references used by strict synthetic checks
        required: false
        default: '180'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/clawsig-guarded-deploy.yml'
      - 'services/clawsig-ledger/**'
      - 'services/clawsig-explorer/**'
      - 'scripts/ops/**'

concurrency:
  group: clawsig-guarded-deploy
  cancel-in-progress: false

jobs:
  guarded-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SYNTHETIC_ALERT_SLACK_WEBHOOK: ${{ secrets.SYNTHETIC_ALERT_SLACK_WEBHOOK }}
      SYNTHETIC_ALERT_DISCORD_WEBHOOK: ${{ secrets.SYNTHETIC_ALERT_DISCORD_WEBHOOK }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Guarded deploy (staging -> strict smoke -> prod -> strict smoke -> rollback on failure)
        id: guarded
        continue-on-error: true
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.max_run_ref_age_minutes }}" ]; then
            MAX_AGE="${{ github.event.inputs.max_run_ref_age_minutes }}"
          else
            MAX_AGE="180"
          fi

          node scripts/ops/run-clawsig-guarded-deploy.mjs --max-run-ref-age-minutes "$MAX_AGE"

      - name: Run staging/prod parity drift gate
        if: steps.guarded.outcome == 'success'
        run: node scripts/ops/check-clawsig-prod-parity-drift.mjs --max-drift-count 0

      - name: Route synthetic alerts (guarded deploy warn/critical)
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_SYNTH_DIR="$(ls -1dt artifacts/ops/clawsig-guarded-deploy/*/synthetic-prod/* 2>/dev/null | head -n 1)"
          if [ -z "$LATEST_SYNTH_DIR" ]; then
            LATEST_SYNTH_DIR="$(ls -1dt artifacts/ops/clawsig-guarded-deploy/*/synthetic-staging/* 2>/dev/null | head -n 1)"
          fi

          if [ -n "$LATEST_SYNTH_DIR" ]; then
            node scripts/ops/route-clawsig-synthetic-alert.mjs \
              --summary "$LATEST_SYNTH_DIR/summary.json" \
              --checks "$LATEST_SYNTH_DIR/checks.json" \
              --workflow-file "clawsig-guarded-deploy.yml"
          else
            echo "No synthetic summary found for guarded deploy alert routing"
          fi

      - name: Enforce fail-closed guarded deploy outcome
        if: steps.guarded.outcome == 'failure'
        run: exit 1

      - name: Upload guarded deploy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clawsig-guarded-deploy-${{ github.run_id }}
          path: |
            artifacts/ops/clawsig-guarded-deploy/
            artifacts/ops/clawsig-parity-drift/
          if-no-files-found: warn
