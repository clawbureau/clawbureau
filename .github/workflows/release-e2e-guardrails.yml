name: release-e2e-guardrails

on:
  pull_request:
    paths:
      - 'packages/clawverify-cli/**'
      - 'packages/clawverify-core/**'
      - 'scripts/release/run-clawsig-v0.2-package-prep.mjs'
      - 'scripts/release/check-real-usecase-evidence-pack.mjs'
      - 'scripts/release/check-causal-integrity-evidence-pack.mjs'
      - 'scripts/release/sign-causal-integrity-evidence-pack.mjs'
      - 'scripts/release/sign-causal-parity-evidence-pack.mjs'
      - 'scripts/protocol/run-causal-integrity-burnin.mjs'
      - 'scripts/protocol/check-causal-fixture-contract.mjs'
      - 'scripts/protocol/check-service-core-causal-reason-code-parity.mjs'
      - 'scripts/protocol/run-clawverify-causal-*.mjs'
      - 'scripts/protocol/run-clawverify-service-core-causal-parity.mjs'
      - 'scripts/protocol/run-clawverify-aggregate-causal-conformance.mjs'
      - 'scripts/poh/smoke-marketplace-e2e-settlement.mjs'
      - 'artifacts/e2e/real-usecases/**'
      - 'docs/pilot/clawsig-v0.2-real-usecase-evidence-pack.md'
      - 'docs/releases/clawsig-v0.2-publish-log.md'
      - '.github/workflows/release-e2e-guardrails.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/clawverify-cli/**'
      - 'packages/clawverify-core/**'
      - 'scripts/release/run-clawsig-v0.2-package-prep.mjs'
      - 'scripts/release/check-real-usecase-evidence-pack.mjs'
      - 'scripts/release/check-causal-integrity-evidence-pack.mjs'
      - 'scripts/release/sign-causal-integrity-evidence-pack.mjs'
      - 'scripts/release/sign-causal-parity-evidence-pack.mjs'
      - 'scripts/protocol/run-causal-integrity-burnin.mjs'
      - 'scripts/protocol/check-causal-fixture-contract.mjs'
      - 'scripts/protocol/check-service-core-causal-reason-code-parity.mjs'
      - 'scripts/protocol/run-clawverify-causal-*.mjs'
      - 'scripts/protocol/run-clawverify-service-core-causal-parity.mjs'
      - 'scripts/protocol/run-clawverify-aggregate-causal-conformance.mjs'
      - 'scripts/poh/smoke-marketplace-e2e-settlement.mjs'
      - 'artifacts/e2e/real-usecases/**'
      - 'docs/pilot/clawsig-v0.2-real-usecase-evidence-pack.md'
      - 'docs/releases/clawsig-v0.2-publish-log.md'
      - '.github/workflows/release-e2e-guardrails.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli-release-closure:
    name: cli-release-closure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run release-prep closure gate
        run: node scripts/release/run-clawsig-v0.2-package-prep.mjs

  release-e2e-evidence-contract:
    name: release-e2e-evidence-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate real-usecase evidence contract
        run: node scripts/release/check-real-usecase-evidence-pack.mjs

  release-causal-integrity-evidence-contract:
    name: release-causal-integrity-evidence-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install clawverify deps
        run: |
          cd services/clawverify
          npm ci

      - name: Install clawverify-core deps
        run: |
          cd packages/clawverify-core
          npm ci

      - name: Build clawverify-core
        run: |
          cd packages/clawverify-core
          npm run build

      - name: Install clawverify-cli deps
        run: |
          cd packages/clawverify-cli
          npm ci

      - name: Run causal integrity burn-in quick lane
        run: |
          node scripts/protocol/run-causal-integrity-burnin.mjs --mode quick --mutation-subset quick

      - name: Run causal reason-code stability lane
        run: |
          node scripts/protocol/run-clawverify-causal-reason-code-stability.mjs

      - name: Run causal fixture-contract lane
        run: |
          node scripts/protocol/check-causal-fixture-contract.mjs

      - name: Run causal cross-runtime determinism lane
        run: |
          node scripts/protocol/run-clawverify-causal-cross-runtime-determinism.mjs

      - name: Sign causal integrity evidence pack
        run: |
          node scripts/release/sign-causal-integrity-evidence-pack.mjs

      - name: Sign causal parity evidence pack
        run: |
          node scripts/release/sign-causal-parity-evidence-pack.mjs

      - name: Validate causal integrity evidence contract
        run: |
          node scripts/release/check-causal-integrity-evidence-pack.mjs --max-age-minutes 30 --require-mode quick --require-mutation-subset quick --require-signed true --require-signed-parity true --require-signed-stability true --require-signed-fixture-contract true --require-signed-cross-runtime true

      - name: Upload causal integrity evidence summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-causal-integrity-evidence-summary
          path: |
            artifacts/ops/causal-integrity-burnin/
            artifacts/ops/causal-service-core-parity/
            artifacts/ops/causal-reason-code-stability/
            artifacts/ops/causal-fixture-contract/
            artifacts/ops/causal-cross-runtime-determinism/
          if-no-files-found: ignore
