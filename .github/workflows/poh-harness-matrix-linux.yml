name: poh-harness-matrix-linux

on:
  pull_request:
    paths:
      - 'packages/clawsig-conformance/**'
      - 'packages/clawverify-core/**'
      - 'packages/clawverify-cli/**'
      - 'scripts/e2e/linux-harness-smoke.mjs'
      - '.github/workflows/poh-harness-matrix-linux.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/clawsig-conformance/**'
      - 'packages/clawverify-core/**'
      - 'packages/clawverify-cli/**'
      - 'scripts/e2e/linux-harness-smoke.mjs'
      - '.github/workflows/poh-harness-matrix-linux.yml'

jobs:
  linux-harness-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install + build clawsig-sdk
        run: |
          cd packages/clawsig-sdk
          npm install
          npm run build

      - name: Install + build clawverify-core
        run: |
          cd packages/clawverify-core
          npm install
          npm run build

      - name: Install + build clawverify-cli
        run: |
          cd packages/clawverify-cli
          npm install
          npm run build

      - name: Install + build clawsig-conformance
        run: |
          cd packages/clawsig-conformance
          npm install
          npm run build

      - name: Provision deterministic CI executables for required lanes
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/clawsig-mock-bin"

          cat > "$RUNNER_TEMP/clawsig-mock-bin/codex" <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          if [[ "${1:-}" == "--version" ]]; then
            echo "codex-ci-shim 1.0"
            exit 0
          fi

          base="${OPENAI_BASE_URL:-${OPENAI_API_BASE:-}}"
          if [[ -z "$base" ]]; then
            echo "codex shim: OPENAI_BASE_URL/OPENAI_API_BASE is required" >&2
            exit 1
          fi

          curl -sS -X POST "$base/v1/chat/completions" \
            -H "content-type: application/json" \
            -H "authorization: Bearer ${OPENAI_API_KEY:-sk-clawsig-mock}" \
            -d '{"model":"gpt-4-conformance-mock","messages":[{"role":"user","content":"hello world"}]}' \
            >/dev/null

          echo '{"ok":true}'
          SH

          cat > "$RUNNER_TEMP/clawsig-mock-bin/gemini" <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          if [[ "${1:-}" == "--version" ]]; then
            echo "gemini-ci-shim 1.0"
            exit 0
          fi

          base="${OPENAI_BASE_URL:-${OPENAI_API_BASE:-}}"
          if [[ -z "$base" ]]; then
            echo "gemini shim: OPENAI_BASE_URL/OPENAI_API_BASE is required" >&2
            exit 1
          fi

          curl -sS -X POST "$base/v1/chat/completions" \
            -H "content-type: application/json" \
            -H "authorization: Bearer ${OPENAI_API_KEY:-sk-clawsig-mock}" \
            -d '{"model":"gpt-4-conformance-mock","messages":[{"role":"user","content":"hello world"}]}' \
            >/dev/null

          echo 'hello world'
          SH

          chmod +x "$RUNNER_TEMP/clawsig-mock-bin/codex" "$RUNNER_TEMP/clawsig-mock-bin/gemini"
          echo "$RUNNER_TEMP/clawsig-mock-bin" >> "$GITHUB_PATH"

          "$RUNNER_TEMP/clawsig-mock-bin/codex" --version
          "$RUNNER_TEMP/clawsig-mock-bin/gemini" --version

      - name: Run Linux harness matrix strict gate (codex + gemini lanes)
        env:
          CLAWSIG_E2E_SKIP_BUILD: '1'
          CLAWSIG_E2E_LINUX_AGENTS: 'codex,gemini'
          CLAWSIG_E2E_LINUX_TIMEOUT_MS: '180000'
          CLAWSIG_FORCE_BASE_URL_OVERRIDE: '1'
        run: |
          node scripts/e2e/linux-harness-smoke.mjs

      - name: Upload Linux harness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poh-harness-matrix-linux
          path: |
            .clawsig/e2e-linux-results.json
            .clawsig/e2e-linux-strict-summary.json
            .clawsig/e2e-workdir/**/.clawsig/proof_bundle.json
          if-no-files-found: warn
