name: cav-roadmap-sync

on:
  pull_request:
    paths:
      - 'docs/roadmaps/clawsig-protocol-v0.2/**'
      - 'docs/specs/clawsig-protocol/**'
      - 'services/clawverify/**'
      - 'packages/clawverify-core/**'
      - 'packages/clawverify-cli/**'
      - 'scripts/docs/check-cav-roadmap-sync.mjs'
      - 'scripts/protocol/run-causal-integrity-burnin.mjs'
      - 'scripts/protocol/check-causal-fixture-contract.mjs'
      - 'scripts/protocol/run-clawverify-causal-*.mjs'
      - 'scripts/protocol/run-clawverify-aggregate-causal-conformance.mjs'
      - 'scripts/release/**'
      - '.github/workflows/causal-integrity-burnin.yml'
      - '.github/workflows/clawverify-causal-*.yml'
      - '.github/workflows/clawverify-aggregate-causal-conformance.yml'
      - '.github/workflows/reason-code-parity.yml'
      - '.github/workflows/release-*.yml'
      - '.github/workflows/clawsig-release-integrity-guardrail.yml'
      - '.github/workflows/cav-roadmap-sync.yml'
  push:
    branches:
      - main
    paths:
      - 'docs/roadmaps/clawsig-protocol-v0.2/**'
      - 'docs/specs/clawsig-protocol/**'
      - 'services/clawverify/**'
      - 'packages/clawverify-core/**'
      - 'packages/clawverify-cli/**'
      - 'scripts/docs/check-cav-roadmap-sync.mjs'
      - 'scripts/protocol/run-causal-integrity-burnin.mjs'
      - 'scripts/protocol/check-causal-fixture-contract.mjs'
      - 'scripts/protocol/run-clawverify-causal-*.mjs'
      - 'scripts/protocol/run-clawverify-aggregate-causal-conformance.mjs'
      - 'scripts/release/**'
      - '.github/workflows/causal-integrity-burnin.yml'
      - '.github/workflows/clawverify-causal-*.yml'
      - '.github/workflows/clawverify-aggregate-causal-conformance.yml'
      - '.github/workflows/reason-code-parity.yml'
      - '.github/workflows/release-*.yml'
      - '.github/workflows/clawsig-release-integrity-guardrail.yml'
      - '.github/workflows/cav-roadmap-sync.yml'

jobs:
  cav-roadmap-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate CAV roadmap sync
        run: |
          node scripts/docs/check-cav-roadmap-sync.mjs
