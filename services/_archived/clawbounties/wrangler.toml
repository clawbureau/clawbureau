name = "clawbounties"
account_id = "b8f2c66f1848dff476faa874282d781e"
main = "src/index.ts"
compatibility_date = "2025-01-01"

routes = [
  { pattern = "clawbounties.com/*", zone_name = "clawbounties.com" },
  { pattern = "www.clawbounties.com/*", zone_name = "clawbounties.com" }
]

[[d1_databases]]
binding = "BOUNTIES_DB"
database_name = "clawbounties"
database_id = "cfdc9fe2-cbed-4d13-9362-67363a8857df"

[[queues.producers]]
binding = "REP_EVENTS"
queue = "clawrep-events"

[triggers]
crons = ["*/5 * * * *"]

[vars]
ENVIRONMENT = "production"
ARENA_RESOLVER_CRON_ENABLED = "true"
ARENA_RESOLVER_CRON_MIN_AGE_MINUTES = "5"
ARENA_RESOLVER_CRON_LIMIT = "80"
BOUNTIES_VERSION = "0.8.0"
CUTS_BASE_URL = "https://clawcuts.com"
ESCROW_BASE_URL = "https://clawescrow.com"
VERIFY_BASE_URL = "https://clawverify.com"
SCOPE_BASE_URL = "https://clawscope.com"
CLAWREP_BASE_URL = "https://clawrep.com"
TEST_HARNESS_BASE_URL = "https://clawtrials.com"
TRIALS_BASE_URL = "https://clawtrials.com"
TEST_HARNESS_TIMEOUT_MS = "120000"
REQUESTER_AUTH_COMPAT_LEGACY = "false"
REQUESTER_AUTH_REQUIRED_AUDIENCE = "clawbounties.com"
REQUESTER_AUTH_TIMEOUT_MS = "5000"
WORKER_AUTH_COMPAT_LEGACY = "false"
WORKER_AUTH_REQUIRED_AUDIENCE = "clawbounties.com"
WORKER_AUTH_TIMEOUT_MS = "5000"

[env.staging]
name = "clawbounties-staging"
routes = [
  { pattern = "staging.clawbounties.com/v1/bounties*", zone_name = "clawbounties.com" },
  { pattern = "staging.clawbounties.com/*", zone_name = "clawbounties.com" }
]

[[env.staging.d1_databases]]
binding = "BOUNTIES_DB"
database_name = "clawbounties-staging"
database_id = "6b04a8f1-75ba-414f-afd8-36067db109a1"

[[env.staging.r2_buckets]]
binding = "ARENA_ARTIFACTS"
bucket_name = "arena-artifacts"

[[env.staging.queues.producers]]
binding = "REP_EVENTS"
queue = "clawrep-events-staging"

[env.staging.triggers]
crons = ["*/5 * * * *"]

[env.staging.vars]
ENVIRONMENT = "staging"
ARENA_RESOLVER_CRON_ENABLED = "true"
ARENA_RESOLVER_CRON_MIN_AGE_MINUTES = "5"
ARENA_RESOLVER_CRON_LIMIT = "80"
BOUNTIES_VERSION = "0.8.0"
CUTS_BASE_URL = "https://staging.clawcuts.com"
ESCROW_BASE_URL = "https://staging.clawescrow.com"
VERIFY_BASE_URL = "https://staging.clawverify.com"
SCOPE_BASE_URL = "https://staging.clawscope.com"
CLAWREP_BASE_URL = "https://staging.clawrep.com"
TEST_HARNESS_BASE_URL = "https://staging.clawtrials.com"
TRIALS_BASE_URL = "https://staging.clawtrials.com"
TEST_HARNESS_TIMEOUT_MS = "120000"
REQUESTER_AUTH_COMPAT_LEGACY = "false"
REQUESTER_AUTH_REQUIRED_AUDIENCE = "staging.clawbounties.com"
REQUESTER_AUTH_TIMEOUT_MS = "5000"
WORKER_AUTH_COMPAT_LEGACY = "false"
WORKER_AUTH_REQUIRED_AUDIENCE = "staging.clawbounties.com"
WORKER_AUTH_TIMEOUT_MS = "5000"

# Secrets:
# - BOUNTIES_ADMIN_KEY
# - BOUNTIES_RISK_KEY
# - ESCROW_SERVICE_KEY
# - TRIALS_SERVICE_KEY
# - CLAWREP_INGEST_KEY
# - SCOPE_ADMIN_KEY

# Arena duel artifacts (screenshots, journeys, lighthouse reports)
[[r2_buckets]]
binding = "ARENA_ARTIFACTS"
bucket_name = "arena-artifacts"
